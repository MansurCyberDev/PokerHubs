version: '3.8'

services:
  bot:
    build: .
    container_name: poker-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
    ports:
      - "8080:8080"
    networks:
      - poker-network
    healthcheck:
      test: ["CMD", "python3", "-c", "import requests; requests.get('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: PostgreSQL for high load (uncomment to use)
  # db:
  #   image: postgres:15-alpine
  #   container_name: poker-db
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: poker
  #     POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
  #     POSTGRES_DB: pokerbot
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - poker-network

  # Optional: Redis for caching and rate limiting
  # redis:
  #   image: redis:7-alpine
  #   container_name: poker-redis
  #   restart: unless-stopped
  #   volumes:
  #     - redis_data:/data
  #   networks:
  #     - poker-network

networks:
  poker-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
